version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    nodejs: latest
  jobs:
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    build:
      html:
        - uvx hatch run docs:build
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - cp -r docs/_build/html/. $READTHEDOCS_OUTPUT/html/

submodules:
  include: all